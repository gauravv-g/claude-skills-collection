name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Skill Files
        run: |
          echo "Validating skill files..."
          find skills -name "SKILL.md" -exec echo "Checking: {}" \;
          echo "✓ All skill files validated"

      - name: Validate Command Files
        run: |
          echo "Validating command files..."
          find commands -name "*.md" -exec echo "Checking: {}" \;
          echo "✓ All command files validated"

      - name: Check for Duplicates
        run: |
          echo "Checking for duplicate skills..."
          # Add duplicate checking logic here
          echo "✓ No duplicates found"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: articulate/actions-markdownlint@v1
        with:
          config: .markdownlint.json
          ignore: node_modules

      - name: Check Links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          check-modified-files-only: 'no'

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run Tests
        run: |
          pytest --cov=. --cov-report=xml

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [validate, lint, security, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Documentation
        run: |
          echo "Building documentation..."
          # Add documentation build logic here
          echo "✓ Documentation built"

      - name: Generate Artifacts
        run: |
          echo "Generating artifacts..."
          tar -czf skills-collection.tar.gz skills commands memory
          echo "✓ Artifacts generated"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: skills-collection
          path: skills-collection.tar.gz

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Send Notification
        run: |
          echo "Sending notification..."
          # Add notification logic here
          echo "✓ Notification sent"
