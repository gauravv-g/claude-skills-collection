name: Lock Closed Issues

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

jobs:
  lock:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Lock closed issues
        uses: actions/lock@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-lock-comment: >
            This pull request has been automatically locked since it has been closed.
            Please open a new PR for any related issues.
          issue-lock-comment: >
            This issue has been automatically locked since it has been closed.
            Please open a new issue for any related discussion.
          lock-inactive-days: 30
          lock-reason: 'resolved'
          only-prs: false
          only-issues: true
