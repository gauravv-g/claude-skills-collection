name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10
            });

            const changelog = commits.map(commit => {
              return `- ${commit.commit.message.split('\n')[0]} (${commit.sha.substring(0, 7)})`;
            }).join('\n');

            core.setOutput('changelog', changelog);

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Changes in this Release

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ```bash
            git clone https://github.com/gauravv-g/claude-skills-collection.git ~/.claude/skills-collection
            cp -r ~/.claude/skills-collection/skills/* ~/.claude/skills/
            cp -r ~/.claude/skills-collection/commands/* ~/.claude/commands/
            cp -r ~/.claude/skills-collection/memory/* ~/.claude/memory/
            ```

            ## What's New

            - See the [CHANGELOG.md](https://github.com/gauravv-g/claude-skills-collection/blob/main/CHANGELOG.md) for detailed changes.

            ## Support

            - 📧 [Email Support](mailto:support@example.com)
            - 💬 [Discord Community](https://discord.gg/)
            - 📝 [Issues](https://github.com/gauravv-g/claude-skills-collection/issues)
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./skills-collection.tar.gz
          asset_name: skills-collection-${{ github.ref }}.tar.gz
          asset_content_type: application/gzip
